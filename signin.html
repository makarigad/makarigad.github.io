<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secure Login | Makari Gad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
  <main class="w-full max-w-sm">
    <div class="text-center mb-6">
       <div class="w-16 h-16 bg-indigo-600 rounded-xl mx-auto flex items-center justify-center text-white font-black text-3xl shadow-lg mb-4">M</div>
       <h1 class="text-2xl font-bold text-white">Makari Gad Systems</h1>
       <p class="text-sm text-slate-400 mt-1">Authorized personnel only</p>
    </div>
    <div class="bg-white rounded-xl shadow-2xl border border-slate-100 p-8">
      <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-600 px-3 py-2 rounded text-sm mb-4 text-center font-bold"></div>
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-slate-700 text-xs font-bold uppercase tracking-wide mb-1">Email Address</label>
          <input id="email" type="email" required placeholder="name@makarigad.com" class="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition" />
        </div>
        <div>
  <label class="block text-slate-700 text-xs font-bold uppercase tracking-wide mb-1">Password</label>
  <div class="relative">
    <input id="password" type="password" required placeholder="••••••••" class="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition pr-12" />
    <button type="button" id="toggle-pw" tabindex="-1" onclick="const i=document.getElementById('password'); i.type=i.type==='password'?'text':'password'; this.textContent=i.type==='password'?'Show':'Hide';" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 hover:text-indigo-600 transition">Show</button>
  </div>
</div>
        <button id="login-button" type="submit" class="w-full py-3 rounded font-bold bg-indigo-600 text-white hover:bg-indigo-700 shadow-md transition">Authenticate</button>
      </form>
    </div>
  </main>
  <script type="module">
    import { supabase } from './core-app.js';

    // If already logged in, redirect to Hub
    supabase.auth.getSession().then(({ data }) => { 
        if (data.session) window.location.href = 'index.html'; 
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-button'); 
      const err = document.getElementById('error-message');
      
      btn.innerText = "Authenticating..."; 
      err.classList.add('hidden');

      const { error } = await supabase.auth.signInWithPassword({ 
          email: document.getElementById('email').value, 
          password: document.getElementById('password').value 
      });

      if (error) {
        err.innerText = error.message;
        err.classList.remove('hidden');
        btn.innerText = "Authenticate";
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
